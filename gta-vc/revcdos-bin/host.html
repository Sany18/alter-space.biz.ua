<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>revcDOS local test host</title>
    <style>
        body { font-family: sans-serif; }
        #controls { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        #status { color: #555; }
        iframe { width: 1280px; height: 720px; max-width: 100%; border: 0; }
        iframe:fullscreen { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <h1>Select Files</h1>
    <div id="controls">
        <button id="chooseFolderBtn">Choose vc-assets folder</button>
        <input type="file" id="fileInput" webkitdirectory directory style="display:none">
        <button id="fullscreenBtn">Fullscreen</button>
        <span id="status">No folder selected</span>
    </div>
    <script>
        let filesMap = new Map();
        const statusEl = document.getElementById('status');
        const hasDirPicker = 'showDirectoryPicker' in window;

        function setStatus(text) {
            statusEl.textContent = text;
        }

        async function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // --- IndexedDB helpers to remember the chosen directory handle across reloads ---
        function openDb() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('revcdos-host', 1);
                req.onupgradeneeded = () => req.result.createObjectStore('handles');
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }
        async function idbGet(key) {
            const db = await openDb();
            return new Promise((resolve, reject) => {
                const getReq = db.transaction('handles', 'readonly').objectStore('handles').get(key);
                getReq.onsuccess = () => resolve(getReq.result);
                getReq.onerror = () => reject(getReq.error);
            });
        }
        async function idbSet(key, value) {
            const db = await openDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('handles', 'readwrite');
                tx.objectStore('handles').put(value, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function collectFilesFromHandle(dirHandle, path, map) {
            for await (const [name, handle] of dirHandle.entries()) {
                const entryPath = path + '/' + name;
                if (handle.kind === 'file') {
                    map.set(entryPath.toLowerCase(), await handle.getFile());
                } else {
                    await collectFilesFromHandle(handle, entryPath, map);
                }
            }
        }

        async function useDirectoryHandle(dirHandle) {
            setStatus(`Reading "${dirHandle.name}"...`);
            const map = new Map();
            await collectFilesFromHandle(dirHandle, dirHandle.name, map);
            filesMap = map;
            setStatus(`Loaded "${dirHandle.name}" (${filesMap.size} files)`);
        }

        async function chooseFolder() {
            if (hasDirPicker) {
                try {
                    const dirHandle = await window.showDirectoryPicker();
                    await idbSet('vc-assets-dir', dirHandle);
                    await useDirectoryHandle(dirHandle);
                } catch (e) {
                    if (e.name !== 'AbortError') console.error(e);
                }
            } else {
                document.getElementById('fileInput').click();
            }
        }

        document.getElementById('chooseFolderBtn').addEventListener('click', chooseFolder);

        document.getElementById('fileInput').addEventListener('change', async function (event) {
            filesMap = new Map(Array.from(event.target.files).map(file => [file.webkitRelativePath.toLowerCase(), file]));
            setStatus(`Loaded ${filesMap.size} files`);
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            document.getElementById('game-frame').requestFullscreen();
        });

        // Try to silently restore the previously granted folder on reload.
        (async () => {
            if (!hasDirPicker) return;
            try {
                const savedHandle = await idbGet('vc-assets-dir');
                if (!savedHandle) return;
                const opts = { mode: 'read' };
                let perm = await savedHandle.queryPermission(opts);
                if (perm === 'prompt') {
                    setStatus(`Click "Choose vc-assets folder" to re-grant access to "${savedHandle.name}"`);
                    // Re-requesting permission for a remembered handle only needs one click
                    // (a native "Allow"/"Deny" prompt), not re-browsing the filesystem.
                    document.getElementById('chooseFolderBtn').textContent = `Re-grant access to "${savedHandle.name}"`;
                    document.getElementById('chooseFolderBtn').onclick = async () => {
                        const granted = await savedHandle.requestPermission(opts);
                        if (granted === 'granted') {
                            document.getElementById('chooseFolderBtn').textContent = 'Choose vc-assets folder';
                            document.getElementById('chooseFolderBtn').onclick = chooseFolder;
                            await useDirectoryHandle(savedHandle);
                        }
                    };
                } else if (perm === 'granted') {
                    await useDirectoryHandle(savedHandle);
                }
            } catch (e) {
                console.warn('Could not restore saved folder:', e);
            }
        })();

        let reportedProgress = 0;
        let currentFile = 0;
        let initialFiles = [];
        window.addEventListener('message', async (event) => {
            const data = event.data;
            if (data.event === 'module.initfs') {
                const preloadFiles = await (await fetch("preload_files.list")).text();
                initialFiles = new Set(preloadFiles.split('\n')
                    .map(line => line.trim().toLowerCase())
                    .filter(line => line.length > 0 && line[0] !== '#' && filesMap.has(line)));
                initialFiles = Array.from(initialFiles);

                currentFile = -1;
                event.source.postMessage({ event: '>module.initfs', files: initialFiles.length }, '*');
            } else if (data.event === 'module.initfile') {
                currentFile++;
                const newProgress = Math.floor((currentFile / initialFiles.length) * 100);
                if (newProgress > reportedProgress) {
                    reportedProgress = newProgress;
                    console.log(reportedProgress + "% " + currentFile + " of " + initialFiles.length);
                }
                if (currentFile < initialFiles.length) {
                    const path = initialFiles[currentFile];
                    const data = await readFileAsync(filesMap.get(path));
                    event.source.postMessage({
                        event: '>module.initfile',
                        path,
                        data: new Uint8Array(data),
                    }, '*', [data]);
                } else {
                    console.error('No more files to provide');
                }
            } else if (data.event === 'module.getasyncurl' && data.file) {
                const file = filesMap.get(data.file.toLowerCase());
                if (file) {
                    const buffer = await readFileAsync(file);
                    event.source.postMessage({
                        event: '>module.getasyncurl',
                        file: data.file,
                        data: new Uint8Array(buffer),
                    }, '*', [buffer]);
                } else {
                    event.source.postMessage({
                        event: '>module.getasyncurl',
                        file: data.file,
                    }, '*');
                }
            } else if (data.event === 'request-fullscreen') {
                document.getElementById('game-frame').requestFullscreen().catch(() => {});
            }
        });
    </script>
    <iframe id="game-frame" src="index.html" allow="fullscreen" style="width: 1280px; height: 720px;"></iframe>
</body>
</html>
