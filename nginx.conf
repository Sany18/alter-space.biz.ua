server {
  listen 80 default_server;
  server_name _;
  return 444;
}

server {
  listen 80;
  server_name ${DOMAIN} www.${DOMAIN};
  root /var/www/${DOMAIN};
  index index.html;

  # Cloudflare terminates TLS and proxies to this origin over plain HTTP, so
  # nginx's own $scheme is always "http". Without this, nginx's automatic
  # redirects (e.g. adding a trailing slash to a directory request) build an
  # absolute http:// Location header, which browsers on the https:// site
  # block as mixed content. Relative redirects sidestep the scheme entirely.
  absolute_redirect off;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /tetris/ {
    alias /var/www/${DOMAIN}/tetris/;
    index index.html;
  }

  location /screen-saver/ {
    alias /var/www/${DOMAIN}/screen-saver/;
    index index.html;
    try_files $uri $uri/ /screen-saver/index.html =404;
  }

  # Uses root, not alias: try_files's URI fallback (the internal redirect to
  # index.html for client-side routes like /note-keeper/policy) doesn't resolve
  # correctly against alias in nginx - a well-documented quirk. root avoids it
  # since it appends the full matched URI instead of substituting the prefix.
  location /note-keeper/ {
    root /var/www/${DOMAIN};
    index index.html;
    try_files $uri $uri/ /note-keeper/index.html =404;
  }

  location /3d-shooter/ws {
    proxy_pass http://localhost:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /3d-shooter/ {
    alias /var/www/${DOMAIN}/3d-shooter/;
    index index.html;
    try_files $uri $uri/ /3d-shooter/index.html =404;
  }

  # /gta-vc (no trailing slash) 301s to /gta-vc/ via nginx's normal directory
  # behavior - deliberately NOT served directly at this exact path: auto.html
  # loads game.js/index.wasm/vc-assets/... via relative URLs, which resolve
  # incorrectly if the browser's address bar doesn't end in a slash (the last
  # path segment gets replaced, not extended, per standard URL resolution).
  location /gta-vc/ {
    alias /var/www/${DOMAIN}/gta-vc/;
    index auto.html;
    # No SPA fallback here: the engine probes vc-assets/ for optional files and
    # relies on a real 404 to mean "missing" - falling back to auto.html would
    # feed it HTML bytes as if they were game data.
  }

  location /gta-vc/vc-assets/ {
    alias /var/www/${DOMAIN}/gta-vc/vc-assets/;
    # The engine speculatively probes vc-assets/ for thousands of optional
    # files and directory entries in preload_files.list. A missing one is
    # normal, not an error, so answer with an empty 200 + X-Missing header
    # (which auto.html's fetchBytes already checks for) instead of a real
    # 404/403 - keeps DevTools quiet without changing what the game receives.
    error_page 403 404 =200 @vc_assets_missing;
  }

  location @vc_assets_missing {
    add_header X-Missing 1 always;
    return 200;
  }
}
